body:
  text: 法孫宗燈記録法語示驀直正禪人古云若無天地量爭得聖胚胎所以學道人先要大其心量闊其胸襟居常孤迥迥峭巍巍一切聖凡因果拘繫不得一切得失是非動移不得一切佛祖冤親近傍不得然後縱其機用指迷導物如龍得水似虎靠山方謂之當家種草嫡骨兒孫可以紹隆聖種開鑿人天不然則得失憂患交戰於中聖凡情量傾奪於外無參究之實無師友之益歲久月深習成自便不覺不知便為流俗阿師於理何益一夏來禪人參隨老僧不去左右似見老僧行徑今日來別老僧思無以贈只有一語切在記取還知麼驀直去示佛國味禪人若要家國泰應須下苦工囓破鐵酸餡依然日出東不見道欲知恁麼事須是恁麼人不是恁麼人爭得恁麼事須知此事迥別不與常情合恁麼也不得不恁麼也不得恁麼不恁麼總不得須解恁麼中不恁麼不恁麼中卻恁麼如水上葫蘆捺著便轉方能少契恁麼事所以學道人要決定志辦久遠心曉夕忘疲不分晝夜鐵酸餡不破不休金剛圈不透不歇一朝㘞的一聲入手受用方知此說不誑不惑還知麼別示遠山照禪人開眼也著動步也著開口也著舉意也著一年三百日一日十二時無時不築著磕著分分明明無缺無多便恁麼會無繩自縛何況莽莽蕩蕩寥寥廓廓伶俐人休待說更問如何與若何一摑打教牙齒落示古梅甲禪人達磨大師曰學道者多證道者少說理者多悟理者少且道過在甚麼處莫是不肯真參實悟獨向義學以資談柄麼咦莫錯會好若只任麼祖師西來只成世諦流布既不如是畢竟如何是全提正令處隨類現身時不見僧問五祖演和尚達磨面壁意旨如何祖曰計較未成還會麼多少伶俐漢杜撰亂差排示杲菴覺禪人上古之人不自滿於學無怠行說相符所以果熟香飄古今欽羡而今世人豈是不及往古因甚十箇五雙退縮將去雖然如是罕逢穿耳客多見刻舟人示緣起序禪人嘗讀古人行腳未有一人不從捨身拚命而得此箇三昧受用者所以云不是一番寒徹骨爭得梅花撲鼻香雖然如是也是臨崖看滸眼示悉菴檀禪人衲子家風不留朕蹟擲劍揮空星流電疾老僧不惜眉毛處通檀禪人瞥不瞥馬祖一喝大雄峰百丈兩耳聾三日急急如律令示知渠達禪人參隨吾住處分知時吾有四物倩爾支持兔角杖子步步隨之登山涉水全提賴伊破砂盆子零零離離立地放下巨靈莫移龜毛榻子左之右之四稜踏地萬象拱儀沒量枕子不高不低有時推出孰不驚疑示源禪人閉關歇得諸緣下無心道自成高峰三十載鐵面絶人情今日入關今日死此時出定此時生重翻舊案爾應別獨創新條孰不驚放去收來都不礙撒開捻住任縱橫見聞直下成休復聲色頭邊法眼明示宗鏡昭昭此事迥別尊貴綿密不落言詮秪許沒量漢直下承當撩起便行遇佛殺佛遇祖殺祖不顧危亡才是吾家種草禪人勉旃示宗眼天機欲烈無明網先須透祖關祖機如掣電眨眼蚤是遲汝但回光返照看聞聞果勝奇聞到無聞地直下忘所知動容揚古路方契祖師機示宗念澄澄八識體圓明號曰如來藏了此別無多即是真如性量等於虛空廓然大圓鏡六七全生滅五根無分別不信但返聞聞中離分別生滅既元離廓爾唯寂滅寂滅六七休脫體澄瑩徹瑩徹即無我大千同禪悅一二三四五六七七六五四三二一識智智識常寂光大圓鏡子黑似漆示宗孔應唯道本無路嫡悟方親語言影響名相非真廓然廣大不離此身會即當下豈用他尋佛祖直指唯是一心虛靈寂妙亙古亙今元自解脫不受一塵悟亦無得迷即漂淪仔細參詳不是別人孔禪知不日午三更示宗穎守朴所謂佛法者不離日用現前若離日用現前何處更有何法來如今你們把穿衣喫飯拈香擇火丟了要去誦經禮佛蒲團上靜坐紙冊上記言記語謂之參學任麼到驢年有何交涉善知識出世只指現前日用這點子別更無他不見昔鳥窠禪師侍者要辭去諸方學佛法去窠云若是要佛法我者裏亦有些子者云便請窠拈起衣上布毛一吹者便領旨更不去也汝試看這吹布毛是何意旨著力參參倘一期撞倒方知一切現成始不負老僧之教誨也示宗參惺惺佛說一切法為度一切心若無一切心何用一切法無一切心時便是三賢十聖底行履處華嚴經中亦只敷演無一切心底三昧境界心既無相亦空便是光明遍照底佛體汝書此經能於拂紙磨墨之時措手築著毗盧頂相便是參學事畢時示宗芳華嚴是法平等無有高下聽著即聾覷著即瞎鎮海明珠誰敢酬價撞著老僧不打即罵示宗燈永傳凡聰敏者學道不患慧不充患定不足有慧無定謂之狂有定無慧謂之癡如定慧均等了須是明大法具正眼將從上諸祖垂示底死貓頭爛骨董一一踏教粉碎始得機緣僧問古人道一切現成只是人不肯承當如何是承當底事師曰喚你作貓兒狗子你還肯麼問如何是透法身句師曰牛踐馬踏問性理之談請為指示師曰上大人丘乙己曰畢竟如何師曰可知禮也問四大五蘊誰將主之師曰無主曰恁麼則散滅去也師曰你喚甚麼作四大五蘊問如何是禪師曰莫俗氣問如何是出格之句師曰一棒打教血流問觸不得背不得意旨如何師曰逢人但恁麼舉問古人道你有拄杖子與你拄杖子意旨如何師曰披髮仗劍祭東風又問你無拄杖子奪你拄杖子聻師曰百萬軍中斬顏良問如何是無位真人師起身曰你問甚麼問如何是三玄師曰墨潑烏雞當夜半如何是三要師曰莫問人曰如何得明師曰日出也問如何是賓主句師揖曰請坐喫茶曰如何是句師曰你聽我安排了也問十二時中如何用心師述偈示之曰雞鳴丑床前鼠子驚跳走翻身摸著枕頭兒始信大悲有千手豎脊梁鉗臭口生平事業定可不這回捉敗無明魁八萬魔軍齊授首平旦寅燒香掃地是當人一上神通非小小斯時冷暖向誰論瓶有米灶有薪家私檢點未全貧漫啓柴門無別箇黎明化外有來賓日出卯稱時打貼自家好人是人非休要論他日免始閻羅惱辦修行須及蚤生死事大莫草草若然錯過此光陰無位真人何處討食時辰糲飯黃虀足養身珍饈百味非余羡淡薄門庭別樣新省出事惜衣珍隨緣弘道豈曾貧勿將口體來博我君向瀟湘我向泰禺中巳有甚間工營雜事將此深心報佛恩了無餘意從人肆開兩眼昂著鼻光陰寸寸莫虛棄堂堂大道絶遮攔點時不到徒取次日南午浩浩塵中誰作主人廛托鉢沿家乞酬施道箇雲門普須仔細莫莽鹵倔僵風流自合古此時若謂打三更百草頭邊曬佛祖日昳未一日衣糧已自廢片心回向老空王始覺為僧真箇貴師子吼元無畏炙背臺邊香百卉告報諸人歸去來勸君莫觸當今諱晡時申投林疾疾鳥飛頻人不收心忙白首辜負靈臺一點真分彼我妄疏親演若迷頭枉受辛肯來隨我忘計較湖上看花別有春日入酉冷淡風光常自守了無元字腳賺人鐵鑄面皮生口祕魔叉子胡狗幾曾看破者般醜於今擲向糞堆頭一喝須彌顛倒走黃昏戊斂足跏趺無可述熒煌燈火佛前輝四壁啾啾鳴蟋蟀元無二豈有一山河大地黑如漆正恁麼時權一問情知你道箇不必人定亥清風明月付誰載譙樓坎坎兩三聲打破寂寥絶對待落空花釋妄宰鱉山成道何堪采胸襟流出蓋乾坤剎剎塵塵觀自在夜半子萬法生緣無底止未明一念未生前三界茫茫從此起形誰興名誰擬看破分明無彼此夢想顛倒皆遠離認著依前還不是贈偈退菴陳居士宗人府經歷世問獨有這些奇絶頂之人方始宜公幸不忘鷲嶺記殷勤穩步莫遺時少伯李居士鹿郡別駕此事非從人處得擬尋言被自心惑滔滔義句不相關親切應須退步直健菴張居士一貫澄明爍太虛山河大地盡如如登壇敏契仲尼旨卻向維摩丈室居護法靖宇馬公湖廣提督雅量中和妙略彰奇動到處展心光慈威盡是無生旨不異維摩大道場護法明宇王公總鎮威武家風逆順機滿腔慈濟若珠璣示身說法輔王化一道圓光處處輝襄于段居士無縫石邊曾有約禪門關鍵亦無多但將無字頻頻舉有朝勘破病維摩水谷大師昆明波翻鱗透網浮山樹老鶴來巢古庭一段風流事幸得水公已伐庖送知恆大師還雞足送君歸去入雞山一路梅花盡逞顏華首峰高天竺近曹溪源潔地頭閒揮弘梵剎人多仰克闊祖庭孰不扳倘晤飲光煩至意馬龍河上水潺潺示監院寰禪人二首吾家有句難瞞汝空劫已前不涉言今日分明頻寫贈任公會去有何玄院事勞公已有年吾家種草要承前栽松古道為標榜景致如斯不論禪示位育通本禪人結制雲水交參五十天生緣敵悟在機先焚香掃地無餘事洗鉢添瓶豈滯玄惜別橋頭鵑自苦思歸嶺畔鶴翩躚隨時受用無多子志氣須教鐵石堅送悉菴禪人江南請藏吾家遠住在天邊此去江南路萬千三藏靈文山嶽大五燈慧命一絲懸洞庭渺渺天連水黔國悠悠地接滇將此身心奉塵剎教興無礙祖師禪送宗燈禪人江南請藏古人為法不辭勞未世修行喜枕高剖背藏經開正眼捨身求偈裂吹毛奘師西涉情忘趾羅什東遊德可褒遺訓遐宣真法藥持還萬里倩伊曹只須念念無移志管取時時意氣滔將此深心奉塵剎自無邪僻賺英豪松枝轉首吾垂望曇萼飛香遍九皋雞足慶雲從此現吾門幢子接天高示本堂大衆蝦蟆拽磨上天台夜半泥牛渡海來六月火中三尺雪石人搖扇點頭回令即穿衣熱打扇渴時飲水饑餐飯眉分八字鼻頭垂朝朝日出大東畔一處玲瓏八面虛遍身無相亦無依箇中嫡透無巴鼻戴角披毛大闡提忤逆聞雷不喫驚從前喪卻滿腔心晴空掣電尋常事赤手殺人不露聲臨濟髑髏生鐵鑄橫身喫棒蒿枝拂更思一頓有人否掣電之機誰敢出上代古人出格機如今人當等閒顧添香洗鉢過瓶來驀直指歸真實處禮佛看經業識忙從頭放下有何傷應知眉在眼睛上識得通身是道場三關總頌上座生緣佛手驢腳灼破四天磨盤八角這箇古錐笑中殺活頌九帶二首婆心浸演九帶禪佛祖髑髏一串穿伶俐衲僧羅不住風流禪客步爭先靈山四十九年事少室二三六代傳空劫以前絶朕兆一回提起一回鮮九帶縱橫理事全協通綿密合方圓分明權實隨機變互換主賓驗正偏日月重開正法眼乾坤老大孰齊肩頭頭日用元非礙信手拈來任倒顛擬顏子喟然章仰之彌高裂破青霄一物也無神用昭昭鑽之彌堅鐵壁銀山欲識一貫北斗南看瞻之在前日出東邊夫子無隱木樨香妍忽焉在後直下便透泥牛度海雷轟宇宙十無頌無為國只這無為國方圓沒等則六門晝夜開一路非通塞不涉春與秋齊張聲與色若非本分人欲入驢年得無星稱只這無星稱權來無少剩重輕定不差纖洪持較盡格外展經綸掌中舒妙勝一擲兩頭平凡聖從茲罄無根樹只這無根樹扶疏難比喻常時自芬芳多劫披霜露堪作大陰涼切忌識情妒沒量信施為何須用回互無底鉢只這無底鉢應用儘周闊托出最風流尋常空豁豁家私誰不美滯貨應須脫擲向大街頭有誰能解奪無底船只這無底船悠悠濟百川煙波隨興轉風月載清眠秋水滿天碧蘆花舞棹玄中流通無住兩岸久俱捐無絃琴只這無絃琴善彈不露音調高人罕識韻古致微深點拂明非指操持豈有心不存玄妙解始作罷琴吟無鬚鎖只這無鬚鎖目前總包褁聖凡心鎖斷語默盡皆可一竅透根源渠今正是我動容揚古路山花開朵朵無孔笛只這無孔笛切忌隨聲覓曲淡神情古風高律呂密陽回天地春瞥轉千年曆脫體獲真聞耳中元寂歷無孔鎚只這無孔鎚收放正相隨殺活憑渠力縱橫信爾為細看無稜縫擬思涉險危命根如未斷徒自乞憐悲無縫塔只這無縫塔日月環周匝雖然沒量寬恰與身相合對面雲浮浮繞簷風颯颯逢入來借樣闌胸與一踏無底籃只這無底籃提出倩誰擔斃鼻盛將活頑皮不用探大開方便濟休作等間談掛在蛟龍閣行人作指南像讚為慧上人題佛祖像讚枝繁本茂源遠流長此圖儼然百世傳芳曰佛曰祖覿面堂堂正法眼藏爐炭鑊湯妙峰水目大小廝當遺斯影像卓豎空幢天台菴主赤手方將插草以供報德你昌咄咄滅眼瞎驢隊隊高強欲讚成罵唾又何妨慧雲大德好自收藏僧奉觀音大士像乞讚師援筆書曰大士真慈覿面無諱東村雞啼西鄰犬吠處處解脫頭頭無畏悲滿十虛迥然絶對唯此普門真常不昧露柱醒醒燈籠瞌睡一擊忘所知桃紅柳還翠二十五圓通我師為上最咦禪不可須臾離瞻之仰之常頂戴野愚禪師真讚唯吾師祖王者氣相佛祖門中出將入相臨濟德山逢之不讓不涉門庭用超宗匠自覺肖孫寫真供養蘊欲讚之出言成謗開峰本師密老和尚此老無狀走在紙上漏逗不少好與痛棒吐舌低聲曰吁者是開峰密和尚的模樣獅象叢中出一頭龍蛇陳上誰敢撞佛祖見而含羞天魔聞之膽喪穿人鼻孔不用純倒嶽傾湫一條棒今日遇著滅眼之逆兒明月清風為供養丈雪和尚以手指像曰這員老禿西川古佛昭覺重開圓悟再出腦後見腮頂門無骨口似血盆牙如劍樹惡辣汪洋臭煙蓬勃正好活埋姑存此幅自贊這箇粗漢描他作麼名喚學蘊一無所蘊道號知空一無所空每每誑惑同流狂言不少說大海水深不過膝道太虛空高不過頂不解機用指東說西惱人念佛參禪笑人建德立功這般行徑輒顛輒風修長老承你畫他來只好擲在火爐中又凌雲寺請咄這箇臭阿師無慚亦無愧板齒上生毛耳聃裏絶對到處濫膺恭敬佛法全然不會無卓鎚之福有湧泉之費終日袖手嘴都盧常時開眼打瞌睡人天隊裏難容他勞諸大師錯相為拈椎豎拂的樣兒正是今日登壇箇箇會看今朝何祥瑞中秋月更明重九菊花媚又昭昭禪人請這箇村僧鬚髮不除煩惱不斷住九台山全無識見說顛倒話放不妨箭為甚如此只因冷地嚙寒冰忽然撞破娘生面從此惡發不近情招他怪罵不知厭鼻竅露雙孔眉稜威一片任麼的行藏要做臨濟之兒孫驢年鴨歲未夢見喝一喝云探竿引草金剛王劍又這箇老禿不解修福懸著羊頭卻賣狗肉口面慈悲心裏甚毒自不知羞猶嫌古佛顛三倒四無拘無束老不歇心城市出入惑人供養瞎人眼目鬚髮不除何異於俗身雖未死先墮地獄咄六六三十六笑者笑兮哭者哭又題行樂圖几几騰騰坐九台恰如死了未曾埋山河大地咸知己那事何曾夢見來又水邊林下漫逍遙廓落癡憨若野樵為愛青山開兩眼松風颯颯耳邊饒畫來紙上成何狀海天空廓月喬喬忌晨拈香臘月初九日開峰密老和尚忌晨懸真設供師以左手拈香曰雲騰至雨以右手拈香曰露結為霜左右兩手相叉曰吽吽豎拂子顧視云鞭起泥牛吼太虛誰知甘露毒於砒一回舉著一回苦橫身北斗臥須彌咦者老和尚當時承兩番惡札逼我太煞只今遺恨難雪且道今日焚香把盞是報恩耶是雪恨耶爾等諸人知麼衆默師良久云到此恩讎難辨別兩行珠淚濕衣裙又僉云昨日臘月八日是釋迦世尊悟道之晨今日臘月初九是本師上密下行大和尚涅盤之日不肖兒無以陳獻唯有一鉢粗米飯一盞白水羹一片枯柴香為恭為敬聊表仁義之道惟師慈鑑可乎師生平只以一條斷貫繩釣撼海鯤鯨用一枝折柱杖擒靠山猛虎文殊引前普賢據後推三世如來於大光明藏中扶歷代祖師於十字街頭今日卻在不肖之拂子頭上放大光明照天照地不肖兒向紅爐烈焰中著塊生煤汪洋海裏駕葉偏舟去也且道如何是大洋海裏的事良久以拂子作搖虜勢云移舟諳水脈舉掉別波瀾如何是烈焰中生煤聻喝一喝云伏惟尚享轉身云適來觸犯尊顏伏惟珍重寄開峰影堂九臺遙望鴈回峰千里南雲咫尺中屈情未雪成遺恨淚把香薪炬鼎中回鴈峰高人盡仰南雲道脈遍中州惟兒不肖栖巖寶計較未成已白頭庚戌春於水目掃塔師舉坐具云塞處非障礙通處沒虛空儼然舊面目明月與清風一回相見一回感進前退後總不中恭惟得戒恩師上無下住大和尚窣堵之前不肖徒蘊聊此一瓣爇向碧落大空亦任香雲舞鳳騰龍觸著鼻孔萬象森羅齊立下風撾動堂前鼓誰識者鼕鼕為雞足悉檀方丈法潤禪師起棺師卓拄杖一下大喝一喝以拄杖指棺曰華首峰前浩浩春今朝電急落星辰請公直踏無生路驀直逍遙莫顧人以拄杖擊棺一下云起雜著擬寒山詩六首如來有明誨智者敢毫昧若違毗奈耶管取人魔隊外資清白談內留諸欲愛刻糞作栴檀圖將心力廢達空執撥無弗覺目之睞殃禍暗裏臻細行亦何在世風多偃蹇僉言都不礙常憶永嘉師不食钁頭菜二一宅六弟兄所司各不同門戶雖有別就裏卻相通唯有最小弟媸媸而俠凶時時愛淫殺帶纍阿家翁我今識得汝慎勿妄忪忪若順我調伏即便以相容去就不無理率爾合真空五八歸圓照不落有為功三博學謂之聞絶學謂之鄰若要切實會學解總非真愚者滯言語聰者墮見聞破此一具關處處得相親不見香嚴老智辨已過人溈山輕把住窘窘莫能伸奮極都屏卻擊竹始通津自從破産後家私日日新四常思往哲言一一膏肓藥至道本非難卻因揀擇縛進退擬思量動之便成瘧轉急復轉遲縱之而綽約若要得相應一切都放卻離心意識參出凡聖路學擘面揮一掌休道我發惡不見西國人穿耳復袒膊五胸中無冰炭箇是了事漢天地與同根虛空沒兩段去住豁隨緣逍遙乎一貫息機歸寂然見聞二俱泮處世若無世於物不生慢背後絶譏毀對面沒稱讚跏趺坐石頭一則閒公案是時持鉢回等閒不炊爨六三教端明正古今尊至聖治國與治心一一任游泳異域道相通諸夏匪不敬慈仁燮大綱靜極而證性去俗入芳筵尸祝天地命衣鉢嗣真傳顏曾與思孟德山臨濟儔冷淡骨俱硬開士古家風全提秉正令六言我為少室兒孫心印曹溪嫡旨來向人間混跡何勞覓他終始客寓不拘期限有緣隨處為家看他浮世茫昧何如冷淡生涯百歲如駒過隙何須定計求長適今那管明日一飽橫眠草堂天地自有真氣何勞妄想思惟梅花若非傲骨翠竹蚤被霜摧活潑之機日用莫能取捨將來形山藏其至寶阿誰頓釋疑猜面前無人等待此間幸有泉幽蒲團放之餘地一日可當千秋先天之理無形率性返觀自神瞬日揚眉示衆惱人不顧家珍我遊佛祖門徑豈從人世安排飯罷梯雲步石莓苔踏破歸來百草頭邊祖意太虛空裏無禪振威一喝聾耳吐舌方驚廓然題壁來往此山裏已今三十年不知城市事只愛高枕眠論道道非識云禪禪不參虛空原無縫昨夜乞豫拳臺山吟十首馬龍河上路迢迢山也瀟瀟水也瀟瀟剎竿迥迥插雲霄風幡飄飄那有塵囂松杉萬箇繞僧寮梵響如潮鐘鼓嘹嘹靈機觸目日昭昭不用指標卻露指標二就水鄰郊闢小岑漁也相尋牧也相尋剎竿才豎號禪林竹木森森花草深深明明竺土大仙心覓箇知音孰是知音隔江招手莫沉吟放任於今收在於今三東風昨夜破梅腮頓釋疑猜也甚奇哉端坐偶然遇善財大笑幾回痛哭幾回歷劫茫茫今泰來寶藏豁開目在懷開天南地北任徘徊岡道無鎚已露囊鎚四道人無事罣心頭太虛絶儔萬象同遊天地寥寥一葉舟今亦悠悠古亦悠悠狂歌放達在林丘衣破無羞絶粒無愁終日灑灑漫隨流不忮不求真箇自由五臺山深處藏藏拙緣箇時節正是時節山山水水皆俊傑花也漏泄鳥也漏泄無端伸出廣長舌松風切切松濤決決菴裏老僧潛自悅不因固拙爭成此拙六已生還如未生前大塊綿綿宇宙涓涓可惜放過許多年說妙談玄管內窺天何如吟醉放高眠聲色冷然不落言詮風流灑灑似神仙不住那邊豈在這邊七全聲全色入圓通一道真空萬聖皆同觀音大士舊家風暮鼓韸韸只這鼕鼕本自圓成不涉功處處無蹤妙辨難窮若還擬議隔千峰者裏失宗何處覓蹤八五蘊裂破絶封疆體用雙彰石女猖狂山門騎殿入僧堂正好承當莫不承當掉頭驀直絶商量籬菊黃黃嶺樹蒼蒼文殊普賢大道場橫也貞祥豎也貞祥九淨裸裸底沒可把脫體瀟灑才是瀟灑下無鎚地上無瓦佛來也打魔來也打道者相逢口似啞知之尚寡達之更寡金毛獅子吼大野風也權且雨也權且十離名離相露堂堂明也昭彰暗也昭彰萬象森羅日舉揚煙水茫茫日月重光波斯上樹笑郎當寒宿列張露結為霜廓寥寥宇宙洪荒不是道場孰是道場臺山隱居歌萬山深處山突兀簇簇峰如盤中粟九臺矗上青雲端滿月臺開光昱昱門前水抱馬龍河峰頂雲朝獅子窟往來踏破一蹊苔丁丁伐殘半林木長廊古殿老頭陀晨鐘暮鼓傳空谷拈香擇火自分明種田博飯家常穆渡河香象截流機露地白牛忘去住池塘春草日芬芳溪嶺風光隨時育不待病僧頻啓口滿耳滿眼先分付夏日林間暑氣微不用湯泉數數沐得意熏風自南來暢我門前松與竹梨棗熟時正當秋霜侵砌畔幾叢菊草色茫茫一片黃野鶴日來峰頂宿嚴冬落葉好煨爐畏冷衣麻復依槲推倒庭際雪獅兒誰和曹溪那一曲不須舞袖與登壇直捷機關豈曾辱少林古致尚儼然庭前柏子猶馥郁擎叉打地懶施為密用縱橫只一拂我也無道與人談我也無書倩人讀唯知日食夜安眠四序隨他自往復門人通檀等同捐資敬刻本師和尚語録二卷附藏流通已結般若之緣早悟無生之旨祈老身康健福壽雲臻見聞展閲同登彼岸吉祥如意者時康熙二十九年菊月日之吉台山宗燈謹識
